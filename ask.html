<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>경제학 원론 질문하기</title>
<meta name="theme-color" content="#2a78d6" />

<style>
  :root {
    --surface-1: #fcfcfb; --page: #f9f9f7; --card: #ffffff;
    --text-primary: #0b0b0b; --text-secondary: #52514e; --muted: #898781;
    --border: rgba(11, 11, 11, 0.10); --accent: #2a78d6; --radius: 14px;
    --shadow: 0 1px 2px rgba(11,11,11,.05), 0 8px 24px rgba(11,11,11,.05);
    --bubble-user: #2a78d6; --bubble-user-text: #ffffff;
    --bubble-ai: #ffffff; --critical: #c0392b;
    font-family: system-ui, -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface-1: #1a1a19; --page: #0d0d0d; --card: #1f1f1e;
      --text-primary: #ffffff; --text-secondary: #c3c2b7; --muted: #898781;
      --border: rgba(255, 255, 255, 0.10); --accent: #3987e5;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.4);
      --bubble-user: #3987e5; --bubble-user-text: #ffffff;
      --bubble-ai: #1f1f1e; --critical: #e66767;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--page); color: var(--text-primary); line-height: 1.6; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 720px; margin: 0 auto; padding: 16px 16px 0; display: flex; flex-direction: column; min-height: 100vh; }
  header.top { padding-bottom: 12px; }
  header.top .toprow { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
  header.top .back { font-size: 12.5px; color: var(--accent); text-decoration: none; }
  header.top .notes-link { font-size: 12.5px; color: var(--accent); text-decoration: none; white-space: nowrap; }
  header.top h1 { font-size: 20px; margin: 6px 0 4px; letter-spacing: -0.02em; }
  header.top .sub { color: var(--muted); font-size: 13px; }
  header.top .note { margin-top: 8px; font-size: 12px; color: var(--muted); background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; }

  .chat { flex: 1; overflow-y: auto; padding: 8px 2px 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 84%; padding: 10px 14px; border-radius: var(--radius); font-size: 14.5px; white-space: pre-wrap; word-break: break-word; box-shadow: var(--shadow); }
  .msg.user { align-self: flex-end; background: var(--bubble-user); color: var(--bubble-user-text); border-bottom-right-radius: 4px; }
  .msg.ai { align-self: flex-start; background: var(--bubble-ai); border: 1px solid var(--border); color: var(--text-primary); border-bottom-left-radius: 4px; }
  .msg.error { align-self: flex-start; background: var(--bubble-ai); border: 1px solid var(--critical); color: var(--critical); }
  .msg.pending { color: var(--muted); font-style: italic; }
  .msg .save-btn {
    display: inline-flex; align-items: center; gap: 4px; margin-top: 8px; padding: 4px 10px;
    background: transparent; border: 1px solid var(--border); border-radius: 999px;
    font-size: 11.5px; color: var(--text-secondary); cursor: pointer;
  }
  .msg .save-btn.saved { color: var(--accent); border-color: var(--accent); }
  .empty { color: var(--muted); font-size: 13.5px; text-align: center; padding: 40px 20px; }
  .empty .ex { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .empty .ex button { background: var(--card); border: 1px solid var(--border); border-radius: 999px; padding: 7px 12px; font-size: 12.5px; color: var(--text-secondary); cursor: pointer; }

  form.composer { position: sticky; bottom: 0; background: var(--page); padding: 10px 0 16px; display: flex; gap: 8px; border-top: 1px solid var(--border); }
  form.composer textarea {
    flex: 1; resize: none; border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px;
    font-size: 14.5px; font-family: inherit; background: var(--card); color: var(--text-primary);
    max-height: 120px; line-height: 1.4;
  }
  form.composer textarea:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  form.composer button { background: var(--accent); color: #fff; border: none; border-radius: 12px; padding: 0 18px; font-size: 14px; font-weight: 600; cursor: pointer; flex-shrink: 0; }
  form.composer button:disabled { opacity: .5; cursor: not-allowed; }
</style>

<div class="wrap">
  <header class="top">
    <div class="toprow">
      <a class="back" href="index.html">← 강의 목록</a>
      <a class="notes-link" href="notes.html">📒 저장한 노트</a>
    </div>
    <h1>💬 경제학 원론에게 질문하기</h1>
    <div class="sub">1강~18강 학습노트 내용을 바탕으로 AI가 답변합니다.</div>
    <div class="note">이 페이지의 답변은 사이트에 정리된 강의 요약 자료(핵심 개념·용어집·퀴즈)에 근거해 AI가 생성합니다. 원본 강의 스크립트를 그대로 인용하지 않으며, 자료에 없는 내용은 답하지 않을 수 있습니다. 마음에 드는 답변은 "💾 저장" 버튼으로 노트에 보관할 수 있습니다.</div>
  </header>

  <div class="chat" id="chat">
    <div class="empty" id="empty">
      궁금한 걸 자유롭게 물어보세요.
      <div class="ex">
        <button type="button" data-q="시간선호가 뭐야?">시간선호가 뭐야?</button>
        <button type="button" data-q="오스트리아 경기변동이론을 쉽게 설명해줘">경기변동이론 쉽게 설명</button>
        <button type="button" data-q="재산권이 왜 중요해?">재산권이 왜 중요해?</button>
        <button type="button" data-q="통화팽창과 인플레이션의 관계는?">통화팽창과 인플레이션</button>
      </div>
    </div>
  </div>

  <form class="composer" id="composer">
    <textarea id="input" rows="1" placeholder="질문을 입력하세요… (Shift+Enter로 줄바꿈)" maxlength="800"></textarea>
    <button type="submit" id="send">전송</button>
  </form>
</div>

<script>
  const chat = document.getElementById('chat');
  const empty = document.getElementById('empty');
  const form = document.getElementById('composer');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const history = [];
  const NOTES_KEY = 'econ_saved_notes';
  const MAX_NOTES = 300;

  function scrollToBottom() {
    chat.scrollTop = chat.scrollHeight;
  }

  function addMessage(role, text, extraClass) {
    if (empty.parentNode) empty.remove();
    const div = document.createElement('div');
    div.className = 'msg ' + role + (extraClass ? ' ' + extraClass : '');
    div.textContent = text;
    chat.appendChild(div);
    scrollToBottom();
    return div;
  }

  function loadNotes() {
    try {
      const raw = JSON.parse(localStorage.getItem(NOTES_KEY) || '[]');
      return Array.isArray(raw) ? raw : [];
    } catch {
      return [];
    }
  }

  function saveNote(question, answer) {
    const notes = loadNotes();
    notes.unshift({ id: Date.now() + '-' + Math.random().toString(36).slice(2, 8), question, answer, savedAt: new Date().toISOString() });
    localStorage.setItem(NOTES_KEY, JSON.stringify(notes.slice(0, MAX_NOTES)));
  }

  function attachSaveButton(bubble, question, answer) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'save-btn';
    btn.textContent = '💾 저장';
    btn.addEventListener('click', () => {
      saveNote(question, answer);
      btn.textContent = '✅ 저장됨';
      btn.classList.add('saved');
      btn.disabled = true;
    });
    bubble.appendChild(document.createElement('br'));
    bubble.appendChild(btn);
  }

  async function ask(question) {
    addMessage('user', question);
    history.push({ role: 'user', content: question });
    const pending = addMessage('ai', '생각하는 중…', 'pending');
    sendBtn.disabled = true;

    try {
      const res = await fetch('/api/ask', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ question, history: history.slice(0, -1) }),
      });
      const data = await res.json();
      if (!res.ok) {
        pending.textContent = data.error || '오류가 발생했습니다.';
        pending.className = 'msg error';
      } else {
        pending.textContent = data.answer;
        pending.className = 'msg ai';
        history.push({ role: 'assistant', content: data.answer });
        attachSaveButton(pending, question, data.answer);
      }
    } catch (err) {
      pending.textContent = '네트워크 오류가 발생했습니다. 잠시 후 다시 시도해주세요.';
      pending.className = 'msg error';
    } finally {
      sendBtn.disabled = false;
      scrollToBottom();
    }
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const q = input.value.trim();
    if (!q) return;
    input.value = '';
    input.style.height = 'auto';
    ask(q);
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      form.requestSubmit();
    }
  });

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  document.querySelectorAll('.empty .ex button').forEach((btn) => {
    btn.addEventListener('click', () => ask(btn.dataset.q));
  });
</script>
