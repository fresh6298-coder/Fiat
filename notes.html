<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>저장한 노트 · 경제학 원론</title>
<meta name="theme-color" content="#2a78d6" />

<style>
  :root {
    --surface-1: #fcfcfb; --page: #f9f9f7; --card: #ffffff;
    --text-primary: #0b0b0b; --text-secondary: #52514e; --muted: #898781;
    --border: rgba(11, 11, 11, 0.10); --accent: #2a78d6; --radius: 14px;
    --shadow: 0 1px 2px rgba(11,11,11,.05), 0 8px 24px rgba(11,11,11,.05);
    --critical: #c0392b;
    font-family: system-ui, -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface-1: #1a1a19; --page: #0d0d0d; --card: #1f1f1e;
      --text-primary: #ffffff; --text-secondary: #c3c2b7; --muted: #898781;
      --border: rgba(255, 255, 255, 0.10); --accent: #3987e5;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.4);
      --critical: #e66767;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--page); color: var(--text-primary); line-height: 1.6; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 720px; margin: 0 auto; padding: 16px 16px 60px; }
  header.top { margin-bottom: 16px; }
  header.top .toprow { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
  header.top .links { display: flex; gap: 12px; align-items: baseline; }
  header.top .back { font-size: 12.5px; color: var(--accent); text-decoration: none; }
  header.top .ask-link, header.top .sync-link { font-size: 12.5px; color: var(--accent); text-decoration: none; white-space: nowrap; background: none; border: none; padding: 0; cursor: pointer; font-family: inherit; }
  header.top h1 { font-size: 20px; margin: 6px 0 4px; letter-spacing: -0.02em; }
  header.top .sub { color: var(--muted); font-size: 13px; }
  header.top .note { margin-top: 8px; font-size: 12px; color: var(--muted); background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; }

  .sync-panel {
    display: none; margin-top: 10px; background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow);
  }
  .sync-panel.open { display: block; }
  .sync-panel h2 { font-size: 14px; margin: 0 0 8px; }
  .sync-panel p { font-size: 12.5px; color: var(--muted); margin: 0 0 10px; line-height: 1.5; }
  .sync-panel .code-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .sync-panel input[type="text"] {
    flex: 1; border: 1px solid var(--border); border-radius: 10px; padding: 8px 10px;
    font-size: 13.5px; background: var(--surface-1); color: var(--text-primary); font-family: inherit;
  }
  .sync-panel .code-row button {
    border: none; border-radius: 10px; padding: 0 12px; font-size: 12.5px; font-weight: 600; cursor: pointer;
    background: var(--accent); color: #fff; white-space: nowrap;
  }
  .sync-panel .row2 { display: flex; gap: 8px; flex-wrap: wrap; }
  .sync-panel .row2 button {
    border: 1px solid var(--border); border-radius: 999px; padding: 6px 12px; font-size: 12px;
    background: transparent; color: var(--text-secondary); cursor: pointer;
  }
  .sync-panel .row2 button.danger { color: var(--critical); border-color: var(--critical); }
  .sync-panel .status { margin-top: 8px; font-size: 12px; }
  .sync-panel .status.saved { color: var(--good, #1a7a1a); }
  .sync-panel .status.err { color: var(--critical); }

  .toolbar { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 10px; }
  .toolbar button {
    background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
    border-radius: 999px; padding: 6px 12px; font-size: 12.5px; cursor: pointer;
  }
  .toolbar button.danger { border-color: var(--critical); color: var(--critical); }

  .note-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); margin-bottom: 12px; }
  .note-card .q { font-size: 14.5px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
  .note-card .a { font-size: 14px; color: var(--text-secondary); white-space: pre-wrap; word-break: break-word; }
  .note-card .meta { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
  .note-card .date { font-size: 11.5px; color: var(--muted); }
  .note-card .del { background: transparent; border: none; color: var(--critical); font-size: 12px; cursor: pointer; padding: 2px 6px; }

  .empty { color: var(--muted); font-size: 13.5px; text-align: center; padding: 60px 20px; }
  .empty a { color: var(--accent); }
</style>

<div class="wrap">
  <header class="top">
    <div class="toprow">
      <a class="back" href="index.html">← 강의 목록</a>
      <div class="links">
        <button type="button" class="sync-link" id="syncToggle">🔗 동기화</button>
        <a class="ask-link" href="ask.html">💬 질문하기</a>
      </div>
    </div>
    <h1>📒 저장한 노트</h1>
    <div class="sub">질문하기 페이지에서 저장한 답변 모음입니다.</div>
    <div class="note" id="storageNote">이 노트는 이 브라우저(로컬 저장소)에만 저장됩니다. 다른 기기나 브라우저에서는 보이지 않으며, 브라우저 데이터를 지우면 함께 삭제됩니다.</div>

    <div class="sync-panel" id="syncPanel">
      <h2>🔗 여러 기기에서 동기화</h2>
      <p>
        동기화 코드를 만들고 다른 기기에도 똑같이 입력하면, 저장한 노트를 어디서든 볼 수 있습니다.
        이 코드는 비밀번호처럼 작동하니 다른 사람과 공유하지 마세요.
      </p>
      <div class="code-row">
        <input type="text" id="syncCodeInput" placeholder="동기화 코드 (예: ab3f-9k2m-plq7-8zxt)" autocomplete="off" />
        <button type="button" id="syncConnectBtn">연결</button>
      </div>
      <div class="row2">
        <button type="button" id="syncNewBtn">새 코드 만들기</button>
        <button type="button" id="syncCopyBtn">코드 복사</button>
        <button type="button" class="danger" id="syncDisconnectBtn">연결 해제</button>
      </div>
      <div class="status" id="syncStatus"></div>
    </div>
  </header>

  <div class="toolbar" id="toolbar" style="display:none;">
    <button type="button" id="refreshBtn">↻ 새로고침</button>
    <button type="button" class="danger" id="clearAll">전체 삭제</button>
  </div>

  <div id="list">불러오는 중…</div>
</div>

<script>
  const NOTES_KEY = 'econ_saved_notes';
  const SYNC_CODE_KEY = 'econ_sync_code';
  const list = document.getElementById('list');
  const toolbar = document.getElementById('toolbar');
  const clearAllBtn = document.getElementById('clearAll');
  const refreshBtn = document.getElementById('refreshBtn');
  const storageNote = document.getElementById('storageNote');

  const syncToggle = document.getElementById('syncToggle');
  const syncPanel = document.getElementById('syncPanel');
  const syncCodeInput = document.getElementById('syncCodeInput');
  const syncConnectBtn = document.getElementById('syncConnectBtn');
  const syncNewBtn = document.getElementById('syncNewBtn');
  const syncCopyBtn = document.getElementById('syncCopyBtn');
  const syncDisconnectBtn = document.getElementById('syncDisconnectBtn');
  const syncStatus = document.getElementById('syncStatus');

  function getSyncCode() {
    return localStorage.getItem(SYNC_CODE_KEY) || '';
  }

  function generateSyncCode() {
    const alphabet = 'abcdefghijklmnopqrstuvwxyz0123456789';
    const bytes = new Uint8Array(16);
    crypto.getRandomValues(bytes);
    const chars = Array.from(bytes, (b) => alphabet[b % alphabet.length]);
    return [chars.slice(0, 4), chars.slice(4, 8), chars.slice(8, 12), chars.slice(12, 16)]
      .map((g) => g.join(''))
      .join('-');
  }

  function setSyncStatus(text, kind) {
    syncStatus.textContent = text;
    syncStatus.className = 'status' + (kind ? ' ' + kind : '');
  }

  function refreshSyncUI() {
    const code = getSyncCode();
    syncCodeInput.value = code;
    syncToggle.textContent = code ? '🔗 동기화 중' : '🔗 동기화';
    storageNote.textContent = code
      ? '동기화 코드로 서버에 저장된 노트를 불러오고 있습니다. 같은 코드를 입력한 다른 기기와 공유됩니다.'
      : '이 노트는 이 브라우저(로컬 저장소)에만 저장됩니다. 다른 기기나 브라우저에서는 보이지 않으며, 브라우저 데이터를 지우면 함께 삭제됩니다.';
  }

  syncToggle.addEventListener('click', () => syncPanel.classList.toggle('open'));

  syncConnectBtn.addEventListener('click', () => {
    const code = syncCodeInput.value.trim().toLowerCase();
    if (!/^[a-z0-9-]{6,64}$/.test(code)) {
      setSyncStatus('코드 형식이 올바르지 않습니다.', 'err');
      return;
    }
    localStorage.setItem(SYNC_CODE_KEY, code);
    refreshSyncUI();
    setSyncStatus('✅ 연결되었습니다.', 'saved');
    render();
  });

  syncNewBtn.addEventListener('click', () => {
    const code = generateSyncCode();
    localStorage.setItem(SYNC_CODE_KEY, code);
    refreshSyncUI();
    setSyncStatus('✅ 새 코드가 생성되었습니다. 다른 기기에 이 코드를 입력해 연결하세요.', 'saved');
    render();
  });

  syncCopyBtn.addEventListener('click', async () => {
    const code = getSyncCode();
    if (!code) {
      setSyncStatus('복사할 코드가 없습니다. 먼저 코드를 만들거나 입력해주세요.', 'err');
      return;
    }
    try {
      await navigator.clipboard.writeText(code);
      setSyncStatus('📋 코드가 복사되었습니다.', 'saved');
    } catch {
      setSyncStatus('복사에 실패했습니다. 코드를 직접 선택해 복사해주세요.', 'err');
    }
  });

  syncDisconnectBtn.addEventListener('click', () => {
    localStorage.removeItem(SYNC_CODE_KEY);
    refreshSyncUI();
    setSyncStatus('연결이 해제되었습니다.', '');
    render();
  });

  function loadLocalNotes() {
    try {
      const raw = JSON.parse(localStorage.getItem(NOTES_KEY) || '[]');
      return Array.isArray(raw) ? raw : [];
    } catch {
      return [];
    }
  }

  function saveLocalNotes(notes) {
    localStorage.setItem(NOTES_KEY, JSON.stringify(notes));
  }

  function formatDate(iso) {
    try {
      const d = new Date(iso);
      return d.toLocaleString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    } catch {
      return '';
    }
  }

  function renderList(notes, onDelete) {
    list.innerHTML = '';

    if (notes.length === 0) {
      toolbar.style.display = 'none';
      const emptyEl = document.createElement('div');
      emptyEl.className = 'empty';
      emptyEl.innerHTML = '아직 저장한 노트가 없습니다.<br /><a href="ask.html">질문하기 페이지</a>에서 마음에 드는 답변을 "💾 저장"해보세요.';
      list.appendChild(emptyEl);
      return;
    }

    toolbar.style.display = 'flex';
    notes.forEach((note) => {
      const card = document.createElement('div');
      card.className = 'note-card';

      const q = document.createElement('div');
      q.className = 'q';
      q.textContent = 'Q. ' + note.question;

      const a = document.createElement('div');
      a.className = 'a';
      a.textContent = note.answer;

      const meta = document.createElement('div');
      meta.className = 'meta';

      const date = document.createElement('div');
      date.className = 'date';
      date.textContent = formatDate(note.savedAt);

      const del = document.createElement('button');
      del.type = 'button';
      del.className = 'del';
      del.textContent = '삭제';
      del.addEventListener('click', () => onDelete(note.id));

      meta.appendChild(date);
      meta.appendChild(del);
      card.appendChild(q);
      card.appendChild(a);
      card.appendChild(meta);
      list.appendChild(card);
    });
  }

  async function render() {
    const code = getSyncCode();

    if (!code) {
      renderList(loadLocalNotes(), (id) => {
        saveLocalNotes(loadLocalNotes().filter((n) => n.id !== id));
        render();
      });
      return;
    }

    list.innerHTML = '불러오는 중…';
    try {
      const res = await fetch('/api/notes?code=' + encodeURIComponent(code));
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'load failed');
      renderList(data.notes || [], async (id) => {
        await fetch('/api/notes', {
          method: 'DELETE',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ code, id }),
        });
        render();
      });
    } catch (err) {
      list.innerHTML = '';
      const errEl = document.createElement('div');
      errEl.className = 'empty';
      errEl.textContent = '동기화된 노트를 불러오지 못했습니다. 잠시 후 새로고침 버튼을 눌러 다시 시도해주세요.';
      list.appendChild(errEl);
      toolbar.style.display = 'flex';
    }
  }

  clearAllBtn.addEventListener('click', async () => {
    if (!confirm('저장한 노트를 모두 삭제할까요? 되돌릴 수 없습니다.')) return;
    const code = getSyncCode();
    if (code) {
      await fetch('/api/notes', {
        method: 'DELETE',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ code }),
      });
    } else {
      saveLocalNotes([]);
    }
    render();
  });

  refreshBtn.addEventListener('click', render);

  refreshSyncUI();
  render();
</script>
